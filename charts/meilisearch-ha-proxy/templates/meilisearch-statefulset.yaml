apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "meilisearch-ha-proxy.fullname" . }}-meilisearch
  labels:
    {{- include "meilisearch-ha-proxy.meilisearchLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "meilisearch-ha-proxy.fullname" . }}-meilisearch-headless
  replicas: {{ .Values.meilisearch.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "meilisearch-ha-proxy.meilisearchLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "meilisearch-ha-proxy.meilisearchLabels" . | nindent 8 }}
    spec:
      {{- with .Values.meilisearch.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.meilisearch.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: meilisearch
          image: "{{ .Values.meilisearch.image.repository }}:{{ .Values.meilisearch.image.tag }}"
          imagePullPolicy: {{ .Values.meilisearch.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: MEILI_MASTER_KEY
              {{- if and .Values.meilisearch.masterKeySecret .Values.meilisearch.masterKeySecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.meilisearch.masterKeySecret.name }}
                  key: {{ .Values.meilisearch.masterKeySecret.key | default "MEILI_MASTER_KEY" }}
              {{- else }}
              value: {{ required "meilisearch.masterKey or meilisearch.masterKeySecret.name is required" .Values.meilisearch.masterKey | quote }}
              {{- end }}
            - name: MEILI_DB_PATH
              value: /meili_data/data.ms
            - name: MEILI_ENV
              value: production
            {{- range $key, $value := .Values.meilisearch.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          args:
            {{- range .Values.meilisearch.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 7700
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.meilisearch.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /meili_data
  {{- if .Values.meilisearch.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.meilisearch.persistence.storageClass }}
        storageClassName: {{ .Values.meilisearch.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.meilisearch.persistence.size }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
