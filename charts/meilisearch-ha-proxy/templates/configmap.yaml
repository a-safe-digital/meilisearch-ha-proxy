apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "meilisearch-ha-proxy.fullname" . }}-config
  labels:
    {{- include "meilisearch-ha-proxy.labels" . | nindent 4 }}
data:
  meili-ha.yaml: |
    listen: ":{{ .Values.proxy.port }}"
    metrics_listen: ":{{ .Values.proxy.metricsPort }}"
    log_level: "info"
    nodes:
      {{- $fullname := include "meilisearch-ha-proxy.fullname" . }}
      {{- range $i := until (int .Values.meilisearch.replicas) }}
      - url: "http://{{ $fullname }}-meilisearch-{{ $i }}.{{ $fullname }}-meilisearch-headless.{{ $.Release.Namespace }}.svc.cluster.local:7700"
        api_key: "{{ $.Values.meilisearch.masterKey }}"
        {{- if eq $i 0 }}
        role: primary
        {{- else }}
        role: replica
        {{- end }}
      {{- end }}
    health_check:
      interval: {{ .Values.healthCheck.interval }}
      timeout: {{ .Values.healthCheck.timeout }}
      unhealthy_threshold: {{ .Values.healthCheck.unhealthyThreshold }}
      healthy_threshold: {{ .Values.healthCheck.healthyThreshold }}
    replication:
      timeout: {{ .Values.replication.timeout }}
    {{- if .Values.raft.enabled }}
    raft:
      data_dir: {{ .Values.raft.dataDir }}
      bootstrap: true
    {{- end }}
