apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meilisearch-ha-proxy.fullname" . }}
  labels:
    {{- include "meilisearch-ha-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "meilisearch-ha-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "meilisearch-ha-proxy.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.proxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: proxy
          image: {{ include "meilisearch-ha-proxy.proxyImage" . }}
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          env:
            - name: MEILI_HA_CONFIG
              value: /config/meili-ha.yaml
          ports:
            - name: http
              containerPort: {{ .Values.proxy.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.proxy.metricsPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.proxy.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "meilisearch-ha-proxy.fullname" . }}-config
