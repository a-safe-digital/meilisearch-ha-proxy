name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./internal/... ./cmd/...
      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 90" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 90% threshold"
            exit 1
          fi
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      meili-primary:
        image: getmeili/meilisearch:v1.30
        ports:
          - 7700:7700
        env:
          MEILI_ENV: development
          MEILI_NO_ANALYTICS: "true"
          MEILI_MASTER_KEY: test-master-key
          MEILI_EXPERIMENTAL_REPLICATION_PARAMETERS: "true"
      meili-replica-1:
        image: getmeili/meilisearch:v1.30
        ports:
          - 7701:7700
        env:
          MEILI_ENV: development
          MEILI_NO_ANALYTICS: "true"
          MEILI_MASTER_KEY: test-master-key
          MEILI_EXPERIMENTAL_REPLICATION_PARAMETERS: "true"
      meili-replica-2:
        image: getmeili/meilisearch:v1.30
        ports:
          - 7702:7700
        env:
          MEILI_ENV: development
          MEILI_NO_ANALYTICS: "true"
          MEILI_MASTER_KEY: test-master-key
          MEILI_EXPERIMENTAL_REPLICATION_PARAMETERS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Wait for MeiliSearch
        run: |
          for port in 7700 7701 7702; do
            for i in $(seq 1 30); do
              if curl -sf http://localhost:$port/health > /dev/null 2>&1; then
                echo "MeiliSearch on port $port is ready"
                break
              fi
              sleep 1
            done
          done
      - name: Run integration tests
        env:
          MEILI_PRIMARY_URL: http://localhost:7700
          MEILI_REPLICA1_URL: http://localhost:7701
          MEILI_REPLICA2_URL: http://localhost:7702
          MEILI_API_KEY: test-master-key
        run: go test -race -tags=integration -v ./test/integration/...

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Start E2E environment
        env:
          TARGETARCH: amd64
        run: docker compose -f docker/docker-compose.test.yml up -d --wait --wait-timeout 60
      - name: Run E2E tests
        env:
          PROXY_URL: http://localhost:7700
          PROXY_API_KEY: test-master-key
        run: go test -race -tags=e2e -v -timeout 5m ./test/e2e/...
      - name: Collect logs
        if: failure()
        run: docker compose -f docker/docker-compose.test.yml logs
      - name: Teardown
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "-s -w" -o meili-ha-proxy-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/meili-ha-proxy/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meili-ha-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: meili-ha-proxy-${{ matrix.goos }}-${{ matrix.goarch }}

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build multi-arch image (test only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: meili-ha-proxy:test

  publish-image:
    name: Publish Container Image
    runs-on: ubuntu-latest
    needs: [lint, security, unit-test, integration-test, e2e-test, build, build-docker, helm-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/a-safe-digital/meilisearch-ha-proxy
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-,format=short
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint charts/meilisearch-ha-proxy/
      - name: Template with masterKey
        run: helm template test charts/meilisearch-ha-proxy/ --set meilisearch.masterKey=test-key
      - name: Template with masterKeySecret
        run: helm template test charts/meilisearch-ha-proxy/ --set meilisearch.masterKeySecret.name=my-secret
      - name: Template with custom replicas
        run: helm template test charts/meilisearch-ha-proxy/ --set meilisearch.masterKey=test --set meilisearch.replicas=5 --set replicaCount=3
      - name: Template with persistence disabled
        run: helm template test charts/meilisearch-ha-proxy/ --set meilisearch.masterKey=test --set meilisearch.persistence.enabled=false
      - name: Verify required masterKey
        run: |
          if helm template test charts/meilisearch-ha-proxy/ 2>/dev/null; then
            echo "::error::Chart should require masterKey or masterKeySecret.name"
            exit 1
          fi
          echo "Correctly requires masterKey configuration"
      - name: Verify template output consistency
        run: |
          # Ensure ConfigMap contains expected node URLs
          helm template test charts/meilisearch-ha-proxy/ --set meilisearch.masterKey=test-key \
            | grep -q "meili-0" || (echo "::error::Missing meili-0 in ConfigMap" && exit 1)
          # Ensure proxy deployment exists
          helm template test charts/meilisearch-ha-proxy/ --set meilisearch.masterKey=test-key \
            | grep -q "kind: Deployment" || (echo "::error::Missing Deployment" && exit 1)
          # Ensure StatefulSet exists
          helm template test charts/meilisearch-ha-proxy/ --set meilisearch.masterKey=test-key \
            | grep -q "kind: StatefulSet" || (echo "::error::Missing StatefulSet" && exit 1)
          echo "Template output consistency verified"
