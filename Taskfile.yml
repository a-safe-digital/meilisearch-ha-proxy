version: "3"

vars:
  BINARY: meili-ha-proxy
  PKG: github.com/a-safe-digital/meilisearch-ha-proxy
  CMD: ./cmd/meili-ha-proxy
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"

tasks:
  default:
    desc: Lint + test + build
    cmds:
      - task: lint
      - task: test
      - task: build

  # ── Build ─────────────────────────────────────────────────────────

  build:
    desc: Build binary for current platform
    cmds:
      - go build -ldflags "-s -w -X main.version={{.VERSION}}" -o bin/{{.BINARY}} {{.CMD}}

  build:all:
    desc: Cross-compile for linux/darwin (amd64+arm64)
    cmds:
      - GOOS=linux  GOARCH=amd64 go build -ldflags "-s -w -X main.version={{.VERSION}}" -o bin/{{.BINARY}}-linux-amd64  {{.CMD}}
      - GOOS=linux  GOARCH=arm64 go build -ldflags "-s -w -X main.version={{.VERSION}}" -o bin/{{.BINARY}}-linux-arm64  {{.CMD}}
      - GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.version={{.VERSION}}" -o bin/{{.BINARY}}-darwin-amd64 {{.CMD}}
      - GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.version={{.VERSION}}" -o bin/{{.BINARY}}-darwin-arm64 {{.CMD}}

  # ── Test ──────────────────────────────────────────────────────────

  test:
    desc: Run unit tests with coverage
    aliases: [test:unit]
    cmds:
      - go test -race -coverprofile=coverage.out -covermode=atomic ./internal/... ./cmd/...
      - go tool cover -func=coverage.out | tail -1

  test:integration:
    desc: Run integration tests (needs MeiliSearch running)
    cmds:
      - go test -race -tags=integration -v -timeout 2m ./test/integration/...

  test:e2e:
    desc: Run E2E tests (starts docker-compose)
    cmds:
      - task: docker:test:up
      - defer: { task: docker:test:down }
      - |
        echo "Waiting for proxy to be healthy..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:7700/health > /dev/null 2>&1; then
            echo "Proxy is healthy!"
            break
          fi
          sleep 2
        done
      - >-
        PROXY_URL=http://localhost:7700 PROXY_API_KEY=test-master-key
        go test -race -tags=e2e -v -timeout 5m ./test/e2e/...

  test:all:
    desc: Run all test suites
    cmds:
      - task: test
      - task: test:integration
      - task: test:e2e

  test:coverage:
    desc: Generate HTML coverage report
    cmds:
      - go test -race -coverprofile=coverage.out -covermode=atomic ./internal/... ./cmd/...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report: coverage.html"

  # ── Lint ──────────────────────────────────────────────────────────

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    cmds:
      - gofmt -s -w .
      - goimports -w .

  # ── Security ──────────────────────────────────────────────────────

  vuln:
    desc: Run govulncheck for known vulnerabilities
    cmds:
      - govulncheck ./...

  # ── Docker ────────────────────────────────────────────────────────

  docker:build:
    desc: Build Docker image (native arch)
    cmds:
      - docker build -f docker/Dockerfile -t {{.BINARY}} .

  docker:multiarch:
    desc: Build multi-arch Docker image (amd64+arm64)
    cmds:
      - docker buildx build --platform linux/amd64,linux/arm64 -f docker/Dockerfile -t {{.BINARY}} .

  docker:up:
    desc: Start full dev stack (proxy + 3 MeiliSearch)
    cmds:
      - docker compose -f docker/docker-compose.yml up -d --build
      - |
        echo ""
        echo "=== MeiliSearch HA Proxy running ==="
        echo "  Proxy:       http://localhost:7700"
        echo "  Metrics:     http://localhost:9090"
        echo "  Primary:     http://localhost:7710"
        echo "  Replica 1:   http://localhost:7711"
        echo "  Replica 2:   http://localhost:7712"
        echo ""
        echo "  API Key:     dev-master-key"
        echo ""
        echo "Try: curl -s http://localhost:7700/health | jq"
        echo "     curl -s http://localhost:7700/cluster/status | jq"

  docker:down:
    desc: Stop dev stack
    cmds:
      - docker compose -f docker/docker-compose.yml down -v

  docker:test:up:
    desc: Start E2E test environment
    cmds:
      - docker compose -f docker/docker-compose.test.yml up -d --build --wait --wait-timeout 120

  docker:test:down:
    desc: Stop E2E test environment
    cmds:
      - docker compose -f docker/docker-compose.test.yml down -v

  docker:logs:
    desc: Follow dev stack logs
    cmds:
      - docker compose -f docker/docker-compose.yml logs -f

  # ── Helm ──────────────────────────────────────────────────────────

  helm:lint:
    desc: Lint Helm chart
    cmds:
      - helm lint charts/meilisearch-ha-proxy/

  helm:template:
    desc: Render Helm templates
    cmds:
      - helm template test charts/meilisearch-ha-proxy/ --set meilisearch.masterKey=test-key

  # ── Run ───────────────────────────────────────────────────────────

  run:
    desc: Build and run locally (requires MeiliSearch backends)
    deps: [build]
    cmds:
      - ./bin/{{.BINARY}}

  # ── Clean ─────────────────────────────────────────────────────────

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ dist/ coverage.out coverage.html
